<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login-Profile</title>
  <link rel="stylesheet" href="style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
 <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
 <link href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:ital,wght@0,400..700;1,400..700&family=Open+Sans:ital,wght@0,300..800;1,300..800&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&family=Roboto:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
</head>
<body>
  <main class="login-box">
    <h1>Login</h1>

    <div class="input-box">
      <input type="text" name="username" id="user" required>
      <label for="user">Username</label>
    </div>

    <div class="input-box">
      <input type="password" name="password" id="pass" required>
      <label for="pass">Password</label>
    </div>

    <div class="options">
      <label class="remember">
        <input type="checkbox" name="remember" id="remember">
        Remember me
      </label>
      <a href="#">Forgot Password?</a>
    </div>

    <button type="submit">Login</button>
    <p class="register">
      Don't have an account?
       <a href="#">Register</a>
    </p>
    
  </main>
</body>
</html>
